# 沙箱网络控制配置文件
# 此文件控制沙箱进程的网络访问策略

[NetworkControl]
# 网络控制方法
# 可选值：
#   None              - 仅使用代理，无强制控制（可被绕过，不推荐）
#   WindowsFirewall   - 使用 Windows 防火墙强制控制（推荐，简单有效）
#   WFP               - 使用 Windows Filtering Platform（最强，内核级控制）
Method=WindowsFirewall

# 代理服务器端口
# 所有网络流量将通过此端口的本地代理
ProxyPort=8080

# 是否允许本地连接（127.0.0.0/8）
# true  - 允许进程访问本地服务（如数据库、其他本地应用）
# false - 只允许连接到代理端口，其他本地连接也被阻止
AllowLocalhost=true

# 过滤模式
# 可选值：
#   Whitelist - 白名单模式：只允许 AllowedDomains 中的域名访问
#   Blacklist - 黑名单模式：阻止 AllowedDomains 中的域名，允许其他所有域名
FilterMode=Blacklist

# 域名黑名单（逗号分隔）
# 黑名单模式：此列表中的域名被阻止访问，其他所有域名允许访问
# 支持通配符：*.example.com 匹配所有 example.com 的子域名
#
# 常见阻止类型：
# - 广告域名：*.ads.com, *.doubleclick.net, *.googlesyndication.com
# - 追踪器：*.tracker.com, *.analytics.com, *.telemetry.com
# - 恶意软件：*.malware.com, *.phishing.com
# - 社交媒体（可选）：*.facebook.com, *.twitter.com
AllowedDomains=*.ads.com,*.doubleclick.net,*.googlesyndication.com,*.adservice.google.com,*.googleadservices.com,*.tracker.com,*.analytics-tracker.com,*.telemetry.microsoft.com,*.malware.com,*.phishing.com,*.suspicious-site.com

# ========================================================================
# 旧版配置兼容（App 节）
# 如果使用旧版配置，请在 [App] 节中设置
# ========================================================================

[App]
# 是否启用网络过滤
# true  - 启用网络控制（使用上面 NetworkControl 节的配置）
# false - 禁用网络控制
networkFilterEnabled=true

# 旧版配置：代理端口（如果 NetworkControl 节未设置，则使用此值）
networkFilterPort=8080

# 旧版配置：允许的 URL 列表（分号或逗号分隔）
# 注意：建议使用 NetworkControl 节的 AllowedDomains 配置
networkFilterAllowedUrls=*.example.com;api.trusted.com

# ========================================================================
# 其他沙箱配置示例
# ========================================================================

# 要启动的程序
# exe=C:\Windows\System32\cmd.exe

# 等待程序退出
# wait=true

# 完整性级别：low(0), medium(1), high(2)
# integrityLevel=low

# 允许访问的路径（分号分隔）
# allowPaths=C:\temp;C:\data

# 环境变量（分号分隔，格式：KEY=VALUE）
# env=MY_VAR=value;ANOTHER_VAR=value2

# 日志
# log=true

# ========================================================================
# 配置示例
# ========================================================================

# 示例 1：白名单模式（只允许特定域名）
# [NetworkControl]
# Method=WindowsFirewall
# FilterMode=Whitelist
# AllowedDomains=*.example.com,api.trusted.com,*.github.com

# 示例 2：黑名单模式（阻止特定域名，允许其他所有域名）
# [NetworkControl]
# Method=WindowsFirewall
# FilterMode=Blacklist
# AllowedDomains=*.ads.com,*.tracker.com,*.malware.com

# 示例 3：最宽松配置（允许所有域名，但仍通过代理记录）
# [NetworkControl]
# Method=WindowsFirewall
# FilterMode=Whitelist
# AllowedDomains=*

# 示例 4：严格配置（只允许特定域名，使用 WFP）
# [NetworkControl]
# Method=WFP
# FilterMode=Whitelist
# AllowLocalhost=false
# AllowedDomains=api.company.com,cdn.company.com

# 示例 5：开发测试配置（无强制控制）
# [NetworkControl]
# Method=None
# FilterMode=Whitelist
# AllowedDomains=*

# 示例 6：生产环境推荐配置（白名单）
# [NetworkControl]
# Method=WindowsFirewall
# ProxyPort=8080
# FilterMode=Whitelist
# AllowLocalhost=true
# AllowedDomains=*.company.com,api.partner.com
